<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scheduling Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #ffffff;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f65275;
        }

        .header h1 {
            font-size: 32px;
            color: #f65275;
        }

        .current-date {
            font-size: 18px;
            color: #041e42;
            font-weight: 600;
            background: #041e42;
            color: #ffffff;
            padding: 8px 16px;
            border-radius: 6px;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .section {
            background: #ffffff;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border: 1px solid #f0f0f0;
        }

        .section h2 {
            margin: -24px -24px 20px -24px;
            background: #041e42;
            color: #ffffff;
            font-size: 24px;
            padding: 16px 24px;
            border-radius: 12px 12px 0 0;
        }

        .card {
            background: #ffffff;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
            border-left: 4px solid #f65275;
            border: 1px solid #f0f0f0;
            border-left: 4px solid #f65275;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(246, 82, 117, 0.2);
        }

        .card.assigned {
            border-left-color: #041e42;
        }

        .card.pending {
            border-left-color: #f65275;
        }

        .card.in-progress {
            border-left-color: #041e42;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            color: #041e42;
        }

        .card-status {
            font-size: 12px;
            padding: 6px 12px;
            border-radius: 4px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .card-status.assigned {
            background: #041e42;
            color: #ffffff;
        }

        .card-status.pending {
            background: #f65275;
            color: #ffffff;
        }

        .card-status.in-progress {
            background: #041e42;
            color: #ffffff;
        }

        .card-detail {
            margin: 8px 0;
            font-size: 14px;
            color: #333;
        }

        .card-detail strong {
            color: #041e42;
            margin-right: 8px;
        }

        .skills-tag {
            display: inline-block;
            background: #041e42;
            color: #ffffff;
            padding: 4px 10px;
            border-radius: 4px;
            margin-right: 6px;
            margin-top: 4px;
            font-size: 12px;
            font-weight: 500;
        }

        .t-minus {
            font-size: 20px;
            font-weight: 700;
            color: #f65275;
            margin-top: 8px;
        }

        .available-date {
            color: #f65275;
            font-weight: 600;
        }

        .duration {
            color: #041e42;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Scheduling Assistant</h1>
        <div class="current-date" id="currentDate"></div>
    </div>

    <div class="container">
        <div class="section">
            <h2>Mechanics</h2>
            <div id="mechanicsContainer"></div>
        </div>

        <div class="section">
            <h2>Projects</h2>
            <div id="projectsContainer"></div>
        </div>
    </div>

    <script>
        // Set current date
        const currentDate = new Date('2026-03-01');
        document.getElementById('currentDate').textContent = currentDate.toLocaleDateString('en-US', {
            weekday: 'long',
            year: 'numeric',
            month: 'long',
            day: 'numeric'
        });

        // Parse CSV
        function parseCSV(text) {
            const lines = text.trim().split('\n');
            const headers = lines[0].split(',');
            return lines.slice(1).map(line => {
                const values = [];
                let current = '';
                let inQuotes = false;

                for (let char of line) {
                    if (char === '"') {
                        inQuotes = !inQuotes;
                    } else if (char === ',' && !inQuotes) {
                        values.push(current.trim());
                        current = '';
                    } else {
                        current += char;
                    }
                }
                values.push(current.trim());

                const obj = {};
                headers.forEach((header, i) => {
                    obj[header.trim()] = values[i]?.replace(/^"|"$/g, '') || '';
                });
                return obj;
            });
        }

        // Calculate days until project starts
        function calculateTMinus(startDate) {
            const start = new Date(startDate);
            const diffTime = start - currentDate;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

            if (diffDays < 0) {
                return 'STARTED';
            } else if (diffDays === 0) {
                return 'Starts in: T-0 (TODAY)';
            } else {
                return `Starts in: T-${diffDays} days`;
            }
        }

        // Render mechanics
        function renderMechanics(mechanics) {
            const container = document.getElementById('mechanicsContainer');
            container.innerHTML = mechanics.map(mechanic => `
                <div class="card ${mechanic.availability_status}">
                    <div class="card-header">
                        <div class="card-title">${mechanic.name}</div>
                        <div class="card-status ${mechanic.availability_status}">${mechanic.availability_status}</div>
                    </div>
                    <div class="card-detail">
                        <strong>Skills:</strong>
                        <div>
                            ${mechanic.skills.split(',').map(skill =>
                                `<span class="skills-tag">${skill.trim()}</span>`
                            ).join('')}
                        </div>
                    </div>
                    <div class="card-detail">
                        <strong>Available:</strong>
                        <span class="available-date">${new Date(mechanic.available_date).toLocaleDateString('en-US')}</span>
                    </div>
                </div>
            `).join('');
        }

        // Render projects
        function renderProjects(projects) {
            const container = document.getElementById('projectsContainer');
            container.innerHTML = projects.map(project => `
                <div class="card ${project.status}">
                    <div class="card-header">
                        <div class="card-title">${project.name}</div>
                        <div class="card-status ${project.status}">${project.status.replace('-', ' ')}</div>
                    </div>
                    <div class="card-detail">
                        <strong>Required Skills:</strong>
                        <div>
                            ${project.required_skills.split(',').map(skill =>
                                `<span class="skills-tag">${skill.trim()}</span>`
                            ).join('')}
                        </div>
                    </div>
                    <div class="card-detail">
                        <strong>Elevators:</strong> <span class="duration">${project.num_elevators}</span>
                    </div>
                    <div class="card-detail">
                        <strong>Start Date:</strong> ${new Date(project.start_date).toLocaleDateString('en-US')}
                    </div>
                    <div class="card-detail">
                        <strong>Duration:</strong> <span class="duration">${project.duration_weeks} weeks</span>
                    </div>
                    <div class="t-minus">${calculateTMinus(project.start_date)}</div>
                </div>
            `).join('');
        }

        // Load data
        async function loadData() {
            try {
                const [mechanicsResponse, projectsResponse] = await Promise.all([
                    fetch('/mechanics'),
                    fetch('/projects')
                ]);

                const mechanics = await mechanicsResponse.json();
                const projects = await projectsResponse.json();

                renderMechanics(mechanics);
                renderProjects(projects);
            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('mechanicsContainer').innerHTML =
                    '<p style="color: red;">Error loading data. Make sure the FastAPI server is running (uvicorn main:app --reload)</p>';
            }
        }

        loadData();
    </script>
</body>
</html>
